name: CI - SecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  security-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: desafio01

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pip install poetry

      - name: Instalar dependências
        run: poetry install

      - name: Rodar Ruff (lint)
        run: poetry run ruff check .

      - name: Rodar Bandit (segurança)
        run: poetry run bandit -r . -x .venv

      - name: Rodar Safety (dependências)
        run: poetry run safety check
